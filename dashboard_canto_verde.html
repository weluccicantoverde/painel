<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Gestão Integrada - Welucci Canto Verde</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        cyanBrand: { start: '#00d2ff', end: '#00a8cc', text: '#ffffff' },
                        welucci: { dark: '#0e2013', primary: '#1c3e24', cream: '#faf8f5' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-welucci-cream font-sans text-slate-800 min-h-screen flex flex-col">
    <header class="bg-gradient-to-r from-[#00daf7] to-[#00b2e6] text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-24 flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <div class="w-16 h-16 bg-white/20 backdrop-blur-md rounded-2xl border border-white/30 flex items-center justify-center shadow-inner">
                    <span class="text-white font-extrabold text-2xl tracking-tighter">WC</span>
                </div>
                <div>
                    <span class="text-white/80 font-bold tracking-widest text-xs uppercase block">SÓCIO PROPRIETÁRIO • RMVP</span>
                    <h1 class="text-white font-bold text-2xl sm:text-3xl tracking-tight -mt-1">Welucci Canto Verde</h1>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div id="sync-status" class="text-xs bg-emerald-900/40 border border-emerald-500/30 text-emerald-200 px-3 py-1.5 rounded-lg flex items-center gap-2">
                    <i class="fa-solid fa-cloud"></i> <span id="status-text">Nuvem Google Ativa</span>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- O resto da estrutura do painel permanece exatamente igual ao anterior -->
        <div class="flex flex-wrap gap-2 border-b border-slate-200 mb-8 pb-px">
            <button onclick="switchTab('dashboard')" id="btn-tab-dashboard" class="tab-btn px-5 py-3 font-semibold text-sm rounded-t-lg text-[#00a8cc] border-b-2 border-[#00a8cc] flex items-center gap-2">Dashboard Geral</button>
            <button onclick="switchTab('lancamentos')" id="btn-tab-lancamentos" class="tab-btn px-5 py-3 font-semibold text-sm rounded-t-lg text-slate-500 flex items-center gap-2">Elenco de Apoio</button>
        </div>

        <section id="tab-lancamentos" class="tab-content hidden space-y-8">
            <div class="bg-white border border-slate-100 rounded-2xl p-6 shadow-sm">
                <h4 class="font-bold text-slate-700 text-lg mb-4">Novo Lançamento de Apoio</h4>
                <form id="form-lancamento" onsubmit="addLancamento(event)" class="grid grid-cols-1 sm:grid-cols-5 gap-4 items-end">
                    <div><label class="block text-xs font-bold text-slate-500 mb-2">Data</label><input type="date" id="input-data" required class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm"></div>
                    <div><label class="block text-xs font-bold text-slate-500 mb-2">Nome</label><input type="text" id="input-nome" placeholder="Ex: Betto" required class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm"></div>
                    <div><label class="block text-xs font-bold text-slate-500 mb-2">Atividade</label><input type="text" id="input-atividade" placeholder="Ex: Musico" required class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm"></div>
                    <div><label class="block text-xs font-bold text-slate-500 mb-2">Status</label><select id="input-status" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm"><option value="Pago">Pago</option><option value="Pendente" selected>Pendente</option></select></div>
                    <div class="flex gap-2"><div><label class="block text-xs font-bold text-slate-500 mb-2">Valor</label><input type="number" step="0.01" id="input-valor" required class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm"></div><button type="submit" class="bg-emerald-700 text-white font-bold px-4 rounded-lg h-10 self-end">Salvar</button></div>
                </form>
            </div>
        </section>
    </main>

    <script>
        // LIGAÇÃO DIRETA À SUA PLANILHA GOOGLE
        const GOOGLE_SHEET_URL = https://docs.google.com/spreadsheets/d/15SS_2h0RKLqwwhja8tuYuLk5L5kpK_D6sqJh3gqFDGs/edit?gid=0#gid=0;

        async function addLancamento(e) {
            e.preventDefault();
            document.getElementById('status-text').innerText = "A guardar na Nuvem...";
            
            const dados = {
                data: document.getElementById('input-data').value,
                nome: document.getElementById('input-nome').value,
                atividade: document.getElementById('input-atividade').value,
                status: document.getElementById('input-status').value,
                valor: document.getElementById('input-valor').value
            };

            try {
                // Envia diretamente para a folha de cálculo usando a API livre do Google Forms/Sheets búlgaro estruturado
                await fetch(GOOGLE_SHEET_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });
                
                document.getElementById('status-text').innerText = "Sincronizado com Google Sheets";
                alert("Lançamento guardado com sucesso na nuvem!");
                document.getElementById('form-lancamento').reset();
            } catch (error) {
                document.getElementById('status-text').innerText = "Erro ao sincronizar";
            }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('tab-' + tabId).classList.remove('hidden');
        }
    </script>
</body>
</html>
